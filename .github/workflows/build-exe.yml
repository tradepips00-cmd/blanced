name: Build V4 Balanced EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name PanelLoopV4Balanced Panel_Loop_V4_Balanced.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PanelLoopV4Balanced-EXE
          path: dist/PanelLoopV4Balanced.exe
